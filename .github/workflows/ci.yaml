name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - name: Install pass and gnupg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pass gnupg
      - name: Install pass and gnupg (macOS)
        if: runner.os == 'macOS'
        run: brew install pass gnupg
      - name: Integration tests
        run: go test -tags integration ./...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
      - name: goreleaser check (deprecations allowed)
        # exit 2 = config valid but uses deprecated properties (the
        # brews section, kept for Linuxbrew support); real config
        # errors exit 1 and still fail.
        run: goreleaser check || [ $? -eq 2 ]
