version: 2

project_name: tfvault

builds:
  - id: tfvault
    main: ./cmd/tfvault
    binary: tfvault
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tedilabs/tfvault/internal/cli.version={{ .Version }}
      - -X github.com/tedilabs/tfvault/internal/cli.commit={{ .ShortCommit }}
      - -X github.com/tedilabs/tfvault/internal/cli.date={{ .Date }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Publishes Casks/tfvault.rb to the tedilabs/homebrew-tap repository on
# every release. Casks are macOS-only; Linux users install via
# install.sh. Requires the HOMEBREW_TAP_TOKEN secret: a fine-grained
# PAT with Contents read/write on tedilabs/homebrew-tap (the default
# GITHUB_TOKEN cannot push to another repository).
homebrew_casks:
  - name: tfvault
    repository:
      owner: tedilabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/tedilabs/tfvault
    description: Universal Terraform credentials helper with pluggable secret backends
    commit_msg_template: "feat: update {{ .ProjectName }} to {{ .Tag }}"
    binaries:
      - tfvault
    caveats: |
      Link the helper into Terraform's plugin directory:
        tfvault install

      Then add to your ~/.terraformrc:
        credentials_helper "tfvault" {
          args = []
        }

      Verify the setup with:
        tfvault status
    # The binaries are not signed/notarized; drop the quarantine bit so
    # Gatekeeper does not block them.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tfvault"]
          end

changelog:
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
