version: 2

project_name: tfvault

builds:
  - id: tfvault
    main: ./cmd/tfvault
    binary: tfvault
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tedilabs/tfvault/internal/cli.version={{ .Version }}
      - -X github.com/tedilabs/tfvault/internal/cli.commit={{ .ShortCommit }}
      - -X github.com/tedilabs/tfvault/internal/cli.date={{ .Date }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# The Homebrew formula (macOS + Linux) is rendered and pushed to
# tedilabs/homebrew-tap by .github/scripts/publish-formula.sh in the
# release workflow. goreleaser's own brews section is deprecated
# (removed in v2.16) and homebrew_casks is macOS-only, so neither fits.

changelog:
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
